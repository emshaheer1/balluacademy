# Render Blueprint: connect this repo and adjust env vars in the dashboard.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: ballu-academy-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
